<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Hub - Đăng nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1565C0 0%, #42A5F5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            border-radius: 20px;
            border: none;
            box-shadow: 0 20px 60px rgba(0,0,0,.25);
        }
        .brand-icon { font-size: 3rem; color: #1976D2; }
        .divider-text { background: white; padding: 0 .75rem; color: #aaa; font-size: .85rem; }
        .google-btn:hover { background: #fce8e6 !important; }
    </style>
</head>
<body>
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-sm-9 col-md-7 col-lg-5 col-xl-4">

                <div class="card login-card">
                    <div class="card-body p-4 p-md-5">
                        <!-- Brand -->
                        <div class="text-center mb-4">
                            <i class="bi bi-mortarboard-fill brand-icon"></i>
                            <h3 class="fw-bold mt-2 mb-0">Course Hub</h3>
                            <p class="text-muted mt-1 mb-0 small">Đăng nhập để tiếp tục</p>
                        </div>

                        <!-- Alerts -->
                        <div th:if="${errorMsg}" class="alert alert-danger py-2 small rounded-3">
                            <i class="bi bi-exclamation-circle-fill me-1"></i>
                            <span th:text="${errorMsg}"></span>
                        </div>
                        <div th:if="${successMsg}" class="alert alert-success py-2 small rounded-3">
                            <i class="bi bi-check-circle-fill me-1"></i>
                            <span th:text="${successMsg}"></span>
                        </div>

                        <!-- Login Form -->
                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label class="form-label fw-semibold small">Tên đăng nhập</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i class="bi bi-person text-muted"></i>
                                    </span>
                                    <input type="text" class="form-control border-start-0 ps-0"
                                           name="username" placeholder="Nhập tên đăng nhập"
                                           autocomplete="username" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold small">Mật khẩu</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i class="bi bi-lock text-muted"></i>
                                    </span>
                                    <input type="password" class="form-control border-start-0 ps-0"
                                           name="password" placeholder="Nhập mật khẩu"
                                           autocomplete="current-password" required>
                                </div>
                            </div>
                            <button type="submit"
                                    class="btn btn-primary w-100 py-2 fw-semibold rounded-pill">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập
                            </button>
                        </form>

                        <div class="text-center mt-4 small">
                            <span class="text-muted">Chưa có tài khoản?</span>
                            <a th:href="@{/register}" class="ms-1 fw-semibold text-primary text-decoration-none">
                                Đăng ký ngay
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Back to home -->
                <div class="text-center mt-3">
                    <a th:href="@{/home}" class="text-white text-decoration-none small opacity-75">
                        <i class="bi bi-arrow-left me-1"></i>Về trang chủ
                    </a>
                </div>

                <!-- Demo hint -->
                <div class="card mt-3 border-0 bg-white bg-opacity-25 text-white rounded-3">
                    <div class="card-body py-2 px-3 small">
                        <strong><i class="bi bi-info-circle me-1"></i>Tài khoản demo:</strong><br>
                        Admin: <code class="text-warning">admin</code> / <code class="text-warning">admin123</code><br>
                        Sinh viên: <code class="text-warning">student1</code> / <code class="text-warning">student123</code>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
