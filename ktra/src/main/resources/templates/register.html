<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Hub - Đăng ký tài khoản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1565C0 0%, #42A5F5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .register-card {
            border-radius: 20px;
            border: none;
            box-shadow: 0 20px 60px rgba(0,0,0,.25);
        }
    </style>
</head>
<body>
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-sm-9 col-md-7 col-lg-5 col-xl-4">

                <div class="card register-card">
                    <div class="card-body p-4 p-md-5">
                        <!-- Brand -->
                        <div class="text-center mb-4">
                            <i class="bi bi-person-plus-fill display-5 text-primary"></i>
                            <h3 class="fw-bold mt-2 mb-0">Tạo tài khoản</h3>
                            <p class="text-muted mt-1 mb-0 small">Đăng ký làm sinh viên trên Course Hub</p>
                        </div>

                        <!-- Error -->
                        <div th:if="${errorMsg}" class="alert alert-danger py-2 small rounded-3">
                            <i class="bi bi-exclamation-circle-fill me-1"></i>
                            <span th:text="${errorMsg}"></span>
                        </div>

                        <!-- Register Form -->
                        <form th:action="@{/register}" method="post" novalidate>
                            <div class="mb-3">
                                <label class="form-label fw-semibold small">
                                    Tên đăng nhập <span class="text-danger">*</span>
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i class="bi bi-person text-muted"></i>
                                    </span>
                                    <input type="text" class="form-control border-start-0 ps-0"
                                           name="username" placeholder="Ít nhất 3 ký tự"
                                           minlength="3" required autocomplete="username">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold small">
                                    Email <span class="text-danger">*</span>
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i class="bi bi-envelope text-muted"></i>
                                    </span>
                                    <input type="email" class="form-control border-start-0 ps-0"
                                           name="email" placeholder="example@email.com"
                                           required autocomplete="email">
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-semibold small">
                                    Mật khẩu <span class="text-danger">*</span>
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i class="bi bi-lock text-muted"></i>
                                    </span>
                                    <input type="password" class="form-control border-start-0 ps-0"
                                           name="password" placeholder="Ít nhất 6 ký tự"
                                           minlength="6" required autocomplete="new-password">
                                </div>
                            </div>

                            <button type="submit"
                                    class="btn btn-primary w-100 py-2 fw-semibold rounded-pill">
                                <i class="bi bi-person-check me-2"></i>Đăng ký tài khoản
                            </button>
                        </form>

                        <!-- Note: default role is STUDENT -->
                        <div class="alert alert-info py-2 mt-3 small rounded-3 border-0 bg-info bg-opacity-10">
                            <i class="bi bi-shield-check me-1 text-info"></i>
                            Tài khoản mới sẽ được cấp quyền <strong>STUDENT</strong> mặc định.
                        </div>

                        <div class="text-center mt-3 small">
                            <span class="text-muted">Đã có tài khoản?</span>
                            <a th:href="@{/login}" class="ms-1 fw-semibold text-primary text-decoration-none">
                                Đăng nhập
                            </a>
                        </div>
                    </div>
                </div>

                <div class="text-center mt-3">
                    <a th:href="@{/home}" class="text-white text-decoration-none small opacity-75">
                        <i class="bi bi-arrow-left me-1"></i>Về trang chủ
                    </a>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
