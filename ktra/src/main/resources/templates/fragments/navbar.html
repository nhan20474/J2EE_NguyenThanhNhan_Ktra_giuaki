<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark shadow-sm" style="background: linear-gradient(90deg,#1565C0,#1976D2);">
    <div class="container-fluid px-4">
        <!-- Brand -->
        <a class="navbar-brand fw-bold fs-5" th:href="@{/home}">
            <i class="bi bi-mortarboard-fill me-2"></i>Course Hub
        </a>

        <button class="navbar-toggler border-0" type="button"
                data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
            <!-- Search Bar -->
            <form class="d-flex mx-auto my-2 my-lg-0" th:action="@{/home}" method="get" style="width:340px">
                <div class="input-group">
                    <input class="form-control form-control-sm rounded-start-pill"
                           type="search" name="search"
                           placeholder="Tìm kiếm học phần..."
                           th:value="${search}">
                    <button class="btn btn-light btn-sm rounded-end-pill px-3" type="submit">
                        <i class="bi bi-search text-primary"></i>
                    </button>
                </div>
            </form>

            <!-- Nav Links -->
            <ul class="navbar-nav ms-auto align-items-lg-center gap-1">
                <li class="nav-item">
                    <a class="nav-link px-2" th:href="@{/home}">
                        <i class="bi bi-house-door me-1"></i>Trang chủ
                    </a>
                </li>

                <!-- My Courses - chi hien thi cho STUDENT -->
                <li class="nav-item" sec:authorize="hasRole('STUDENT')">
                    <a class="nav-link px-2" th:href="@{/enroll/my-courses}">
                        <i class="bi bi-journal-bookmark me-1"></i>Học phần của tôi
                    </a>
                </li>

                <!-- Admin menu -->
                <li class="nav-item dropdown" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link dropdown-toggle px-2" href="#" data-bs-toggle="dropdown">
                        <i class="bi bi-gear-fill me-1"></i>Quản lý
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                        <li>
                            <a class="dropdown-item" th:href="@{/admin/courses}">
                                <i class="bi bi-book me-2 text-primary"></i>Quản lý học phần
                            </a>
                        </li>
                    </ul>
                </li>

                <!-- Authenticated user -->
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <span class="nav-link px-2 text-white-50 small">
                        <i class="bi bi-person-circle me-1 text-warning"></i>
                        <span sec:authentication="name" class="text-white"></span>
                    </span>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-sm btn-outline-light rounded-pill px-3">
                            <i class="bi bi-box-arrow-right me-1"></i>Đăng xuất
                        </button>
                    </form>
                </li>

                <!-- Guest links -->
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link px-2" th:href="@{/login}">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Đăng nhập
                    </a>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="btn btn-sm btn-warning rounded-pill px-3 ms-1" th:href="@{/register}">
                        <i class="bi bi-person-plus me-1"></i>Đăng ký
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
