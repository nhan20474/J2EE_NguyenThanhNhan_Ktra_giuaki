<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Hub - Quản lý học phần</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; }
        .table th { white-space: nowrap; }
        .course-thumb { width: 64px; height: 42px; object-fit: cover; border-radius: 6px; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container-fluid px-4 py-4">
        <!-- Header row -->
        <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-2">
            <div>
                <h4 class="fw-bold mb-0">
                    <i class="bi bi-book-fill me-2 text-primary"></i>Quản lý học phần
                </h4>
                <p class="text-muted mb-0 small">
                    Tổng cộng <span th:text="${courses.size()}">0</span> học phần
                </p>
            </div>
            <a th:href="@{/admin/courses/new}" class="btn btn-primary rounded-pill px-4">
                <i class="bi bi-plus-circle me-1"></i>Thêm học phần
            </a>
        </div>

        <!-- Flash messages -->
        <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show rounded-3 border-0 border-start border-success border-4">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${successMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Table card -->
        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th class="ps-4">#</th>
                                <th>Ảnh</th>
                                <th>Tên học phần</th>
                                <th>Tín chỉ</th>
                                <th>Giảng viên</th>
                                <th>Danh mục</th>
                                <th class="text-center pe-4">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="course, stat : ${courses}">
                                <td class="ps-4 text-muted" th:text="${stat.count}"></td>
                                <td>
                                    <img th:src="${course.image != null && !#strings.isEmpty(course.image)}
                                                  ? ${course.image}
                                                  : 'https://via.placeholder.com/64x42?text=?'"
                                         class="course-thumb"
                                         onerror="this.src='https://via.placeholder.com/64x42?text=?'"
                                         alt="">
                                </td>
                                <td class="fw-semibold" th:text="${course.name}"></td>
                                <td>
                                    <span class="badge rounded-pill"
                                          style="background:linear-gradient(90deg,#1976D2,#42A5F5)"
                                          th:text="${course.credits} + ' TC'"></span>
                                </td>
                                <td th:text="${course.lecturer}"></td>
                                <td>
                                    <span class="badge bg-light text-secondary border"
                                          th:if="${course.category != null}"
                                          th:text="${course.category.name}"></span>
                                    <span class="text-muted" th:unless="${course.category != null}">—</span>
                                </td>
                                <td class="text-center pe-4">
                                    <a th:href="@{/admin/courses/{id}/edit(id=${course.id})}"
                                       class="btn btn-sm btn-outline-primary rounded-pill me-1"
                                       title="Chỉnh sửa">
                                        <i class="bi bi-pencil-fill"></i>
                                    </a>
                                    <form th:action="@{/admin/courses/{id}/delete(id=${course.id})}"
                                          method="post" class="d-inline"
                                          onsubmit="return confirm('Xác nhận xóa học phần này?')">
                                        <button type="submit"
                                                class="btn btn-sm btn-outline-danger rounded-pill"
                                                title="Xóa">
                                            <i class="bi bi-trash-fill"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>

                            <tr th:if="${courses.isEmpty()}">
                                <td colspan="7" class="text-center text-muted py-5">
                                    <i class="bi bi-inbox display-5 d-block mb-2"></i>
                                    Chưa có học phần nào.
                                    <a th:href="@{/admin/courses/new}" class="d-block mt-2">Thêm ngay</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
